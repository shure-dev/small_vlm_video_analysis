<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>SOP再生ビューア</title>
<style>
  :root {
    --ok: #1a7f37;
    --ok-bg: #e6f4ea;
    --no: #6b7280;
    --no-bg: #f1f2f4;
    --unclear: #b45309;
    --unclear-bg: #fef3e0;
    --bad: #c0362c;
    --bad-bg: #fbe9e7;
    --line: #ddd;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f7f7f5;
    color: #1c1c1c;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: #fff;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; flex: 1; }
  #modelPicker, #unitPicker, #datasetPicker { font-size: 12px; color: #666; white-space: nowrap; }
  #modelSelect, #unitSelect, #datasetSelect {
    font-size: 13px;
    padding: 4px 8px;
    margin-left: 4px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: #fff;
    font-family: inherit;
    max-width: 240px;
  }
  main {
    display: flex;
    gap: 20px;
    padding: 20px;
    max-width: 1180px;
    margin: 0 auto;
  }
  .left { flex: 0 0 480px; }
  .right { flex: 1; min-width: 0; }

  #frameImg {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #000;
    aspect-ratio: 4/3;
    object-fit: contain;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .controls button {
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: #fff;
    cursor: pointer;
  }
  .controls button:hover { background: #f0f0f0; }
  #scrubber { flex: 1; }
  #timeLabel {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: #444;
    white-space: nowrap;
    min-width: 108px;
    text-align: right;
  }
  details {
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }
  summary {
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    color: #444;
  }
  #rawOutput {
    margin: 0;
    padding: 12px;
    border-top: 1px solid var(--line);
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 220px;
    overflow: auto;
    color: #333;
  }

  .left h2, .right h2 {
    font-size: 13px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 8px;
  }
  .left h2 { margin-top: 18px; }

  #events { display: flex; flex-direction: column; gap: 10px; }
  .erow {
    padding: 8px 10px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .erow.active { border-color: #333; box-shadow: 0 0 0 2px rgba(0,0,0,0.06) inset; }
  .ehead {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .ename { font-weight: 600; }
  .estatus { font-size: 12px; }
  .estatus.ok { color: var(--ok); }
  .estatus.missing { color: var(--bad); }
  .estatus.correctly-absent { color: #888; }
  .timeline {
    position: relative;
    height: 10px;
    background: var(--no-bg);
    border-radius: 5px;
    margin-top: 6px;
    overflow: visible;
  }
  .timeline .span {
    position: absolute;
    top: 0; bottom: 0;
    background: var(--ok);
    opacity: 0.35;
    border-radius: 5px;
  }
  .timeline .span.gt {
    background: transparent;
    border: 2px solid #2563eb;
    opacity: 0.9;
  }
  .legend { font-size: 11px; color: #999; text-transform: none; letter-spacing: 0; margin-left: 8px; }
  .legend .sw-det { color: var(--ok); }
  .legend .sw-gt { color: #2563eb; }
  .timeline .playhead {
    position: absolute;
    top: -3px; bottom: -3px;
    width: 2px;
    background: #1c1c1c;
  }

</style>
</head>
<body>
  <header>
    <h1 id="sopName"></h1>
    <label id="datasetPicker" hidden>データセット<select id="datasetSelect"></select></label>
    <label id="unitPicker" hidden>サンプル<select id="unitSelect"></select></label>
    <label id="modelPicker">モデル<select id="modelSelect"></select></label>
  </header>

  <main>
    <section class="left">
      <img id="frameImg" alt="frame">
      <div class="controls">
        <button id="prevBtn">◀</button>
        <button id="playBtn">▶ 再生</button>
        <button id="nextBtn">▶</button>
        <input type="range" id="scrubber" min="0" value="0" step="1">
        <span id="timeLabel"></span>
      </div>
      <details>
        <summary>このフレームでモデルが返した生出力(デバッグ用)</summary>
        <pre id="rawOutput"></pre>
      </details>
    </section>

    <section class="right">
      <h2>イベント検出<span id="gtLegend" class="legend" hidden>
        <span class="sw-det">■</span> 検出 / <span class="sw-gt">□</span> 正解(人手アノテーション)</span></h2>
      <div id="events"></div>
    </section>
  </main>

<script>
const DATA = "__REPLAY_DATA__";

let dataset = DATA.dataset_order[0];          // 現在選択中のデータセット
const D = () => DATA.datasets[dataset];
// サンプルはモデル数の多い順に並べて扱う(比較できるサンプルを上に・初期表示にする)。
// runがunitを部分的にしか持たないため、Opusしか無いunitと全モデル揃うunitが混在する。
const unitsByModels = () => D().unit_order.slice()
  .sort((a, b) => D().units[b].model_order.length - D().units[a].model_order.length);
let unit = unitsByModels()[0];                // 現在選択中のサンプル(最初は最多モデルのunit)
const U = () => D().units[unit];
let model = U().model_order[0];               // 現在選択中のモデル名
const M = () => U().models[model];            // そのモデルの検出・回答結果

let GT = null;
let idx = 0;
let playing = false;
let timer = null;

const scrubber = document.getElementById("scrubber");

// データセット切替プルダウン。1つだけなら隠す。
const datasetSelect = document.getElementById("datasetSelect");
document.getElementById("datasetPicker").hidden = DATA.dataset_order.length < 2;
DATA.dataset_order.forEach(id => {
  const opt = document.createElement("option");
  opt.value = id;
  opt.textContent = DATA.datasets[id].name;
  datasetSelect.appendChild(opt);
});
datasetSelect.value = dataset;
datasetSelect.addEventListener("change", () => {
  dataset = datasetSelect.value;
  idx = 0;
  setupDataset();
});

// サンプル(unit)切替プルダウン。選択肢はデータセットごとに作り直す。
const unitSelect = document.getElementById("unitSelect");
unitSelect.addEventListener("change", () => {
  unit = unitSelect.value;
  idx = 0;
  setupUnit();
});

// モデル切替プルダウン。選択肢はunitごとに作り直す(runがunitを部分的にしか持たない場合がある)。
const modelSelect = document.getElementById("modelSelect");
modelSelect.addEventListener("change", () => { model = modelSelect.value; render(); });

// データセット切替時: サンプル一覧を作り直してから、unitのセットアップへ。
function setupDataset() {
  unitSelect.innerHTML = "";
  const order = unitsByModels();  // モデル数の多いサンプルを上に
  order.forEach(id => {
    const opt = document.createElement("option");
    opt.value = id;
    const n = D().units[id].model_order.length;
    // モデル数を併記して、比較できるサンプル(複数モデル)がひと目で分かるようにする
    opt.textContent = `${D().units[id].label} — ${n}モデル`;
    unitSelect.appendChild(opt);
  });
  document.getElementById("unitPicker").hidden = order.length < 2;
  if (!order.includes(unit)) unit = order[0];
  unitSelect.value = unit;
  setupUnit();
}

// unit切替時に作り直すもの: タイトル・モデル一覧・正解区間・スクラバー範囲。
function setupUnit() {
  document.getElementById("sopName").textContent = U().sop.name;
  GT = U().gt;
  document.getElementById("gtLegend").hidden = !GT;

  modelSelect.innerHTML = "";
  U().model_order.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    modelSelect.appendChild(opt);
  });
  if (!U().model_order.includes(model)) model = U().model_order[0];
  modelSelect.value = model;

  scrubber.max = U().n_frames - 1;
  render();
}

// 正解区間(あれば)。tIoU = フレームidx集合同士の temporal IoU。
// 検出側は実際に一致したフレーム(ev.idxs)で数え、max_gapで橋渡しした隙間は含めない。
function tiou(gtSpan, ev) {
  const det = new Set(ev.idxs);
  let inter = 0;
  for (let i = gtSpan.start_idx; i <= gtSpan.end_idx; i++) if (det.has(i)) inter++;
  if (inter <= 0) return 0;
  const union = (gtSpan.end_idx - gtSpan.start_idx + 1) + det.size - inter;
  return inter / union;
}

function renderEvents() {
  const box = document.getElementById("events");
  box.innerHTML = "";
  for (const [name, ev] of Object.entries(M().events)) {
    const spans = ev.spans || [];               // 全出現区間(同じ動作の複数回を各回別々に)
    const detected = spans.length > 0;
    const active = spans.some(s => idx >= s.start && idx <= s.end);
    const gtSpan = GT ? GT[name] : undefined;   // undefined=未注釈 / null=起きていない
    const spanText = spans.map(s => s.start === s.end ? `${s.start}` : `${s.start}-${s.end}`).join(", ");

    let statusText, statusClass;
    if (detected) {
      statusText = spans.length > 1
        ? `検出 ${spans.length}回 (f${spanText})`
        : `検出 (f${spanText})`;
      statusClass = "ok";
    } else {
      statusText = "未検出";
      statusClass = "missing";
    }
    if (gtSpan && detected) {
      statusText += ` / tIoU ${tiou(gtSpan, ev).toFixed(2)}`;
    } else if (gtSpan && !detected) {
      statusText = `見逃し(正解: frame ${gtSpan.start_idx}-${gtSpan.end_idx})`;
      statusClass = "missing";
    } else if (gtSpan === null && detected) {
      statusText += " / 誤検出(正解: 起きていない)";
      statusClass = "missing";
    } else if (gtSpan === null && !detected) {
      statusText = "未検出(正解: 起きていない)";
      statusClass = "correctly-absent";
    }

    const row = document.createElement("div");
    row.className = "erow" + (active ? " active" : "");
    const label = ev.label || name;
    row.innerHTML = `
      <div class="ehead">
        <span class="ename">${label}</span>
        <span class="estatus ${statusClass}">${statusText}</span>
      </div>
      <div class="timeline"></div>
    `;
    const tl = row.querySelector(".timeline");
    for (const s of spans) {                     // 各出現を別々の帯で描く
      const bar = document.createElement("div");
      bar.className = "span";
      bar.style.left = (s.start / U().n_frames * 100) + "%";
      bar.style.width = ((s.end - s.start + 1) / U().n_frames * 100) + "%";
      tl.appendChild(bar);
    }
    if (gtSpan) {
      const span = document.createElement("div");
      span.className = "span gt";
      span.style.left = (gtSpan.start_idx / U().n_frames * 100) + "%";
      span.style.width = ((gtSpan.end_idx - gtSpan.start_idx + 1) / U().n_frames * 100) + "%";
      tl.appendChild(span);
    }
    const playhead = document.createElement("div");
    playhead.className = "playhead";
    playhead.style.left = (idx / Math.max(U().n_frames - 1, 1) * 100) + "%";
    tl.appendChild(playhead);

    box.appendChild(row);
  }
}

function render() {
  const frame = M().frames[idx];
  document.getElementById("frameImg").src = U().images[idx];
  document.getElementById("timeLabel").textContent =
    `t=${U().times[idx].toFixed(1)}s  (${idx + 1}/${U().n_frames})`;
  document.getElementById("rawOutput").textContent = frame.raw;
  scrubber.value = idx;
  renderEvents();
}

function stop() {
  playing = false;
  clearInterval(timer);
  document.getElementById("playBtn").textContent = "▶ 再生";
}

// 末尾まで行ったら先頭に戻って回し続ける(ページを開いた時点で自動開始)。
function startPlay() {
  playing = true;
  document.getElementById("playBtn").textContent = "⏸ 停止";
  timer = setInterval(() => {
    idx = (idx + 1) % U().n_frames;
    render();
  }, 650);
}

function step(delta) {
  idx = Math.max(0, Math.min(U().n_frames - 1, idx + delta));
  render();
}

document.getElementById("playBtn").addEventListener("click", () => {
  playing ? stop() : startPlay();
});
document.getElementById("prevBtn").addEventListener("click", () => { stop(); step(-1); });
document.getElementById("nextBtn").addEventListener("click", () => { stop(); step(1); });
scrubber.addEventListener("input", () => { stop(); idx = parseInt(scrubber.value, 10); render(); });
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") { stop(); step(-1); }
  if (e.key === "ArrowRight") { stop(); step(1); }
  if (e.key === " ") { e.preventDefault(); document.getElementById("playBtn").click(); }
});

setupDataset();
startPlay();   // 自動再生(ループ)
</script>
</body>
</html>
