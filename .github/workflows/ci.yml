name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[test]'
      - run: python -m pytest
      - run: sop-dataset validate --dataset factory_ego
      - run: sop-dataset validate --dataset konro_inspection
      - run: python tools/benchmark/validate.py
      - run: python tools/quality/check_docs.py
      - run: python tools/quality/check_public.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm audit --audit-level=high
      - working-directory: web
        run: npm run build
      - run: git diff --exit-code -- src/small_vlm_sop_check/apps/frontend_dist
