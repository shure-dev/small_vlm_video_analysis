sop:
  id: f003_w010_mold_preparation
  name: 'Factory Ego: f003_w010_mold_preparation'
  domain_hint: 'First-person camera of a worker preparing a two-part mold at a pressing machine, with a large clay cup insert and white dusting powder.'
questions:
- id: load_insert
  ask: 'Considering the motion across the recent frames, is the worker placing the large clay cup onto the center of the open lower mold in the latest frame?'
  values:
  - 'yes'
  - 'no'
- id: close_mold
  ask: 'Considering the motion across the recent frames, is the worker placing the top half of the mold over the assembly in the latest frame?'
  values:
  - 'yes'
  - 'no'
- id: press_mold
  ask: 'Considering the motion across the recent frames, is the worker pushing the closed mold assembly into the pressing machine in the latest frame?'
  values:
  - 'yes'
  - 'no'
- id: walk_away
  ask: 'Considering the motion across the recent frames, is the worker stepping away from the machine and walking around the workshop in the latest frame?'
  values:
  - 'yes'
  - 'no'
events:
  load_insert:
    evidence: load_insert==yes
    min_frames: 1
  close_mold:
    evidence: close_mold==yes
    min_frames: 1
  press_mold:
    evidence: press_mold==yes
    min_frames: 1
  walk_away:
    evidence: walk_away==yes
    min_frames: 2
relations: []
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: 'events designed from the annotated-egocentric-10k transcription of factory003_worker010_00004; timestamps are LLM-generated estimates, not human ground truth'
  review:
    expected_sequence:
    - event: load_insert
      window_offset_estimate: '0-2s'
    - event: close_mold
      window_offset_estimate: '2-4s'
    - event: press_mold
      window_offset_estimate: '4-5s'
    - event: walk_away
