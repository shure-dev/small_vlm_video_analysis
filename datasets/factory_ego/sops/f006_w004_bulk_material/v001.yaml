sop:
  id: f006_w004_bulk_material
  name: 'Factory Ego: f006_w004_bulk_material'
  domain_hint: '工場の一人称視点（頭部装着カメラ）映像。筒状部品の山と鉄箱のある工場の床。'
questions:
- id: pick_parts_from_pile
  ask: '作業者は山積みの部品の中から筒状の部品を拾い上げているか？'
  values:
  - 'yes'
  - 'no'
- id: put_parts_into_box
  ask: '作業者は筒状の部品を鉄製の箱の中に入れているか？'
  values:
  - 'yes'
  - 'no'
- id: reposition_parts_box
  ask: '作業者は部品の入った鉄箱を引いて位置を直しているか？'
  values:
  - 'yes'
  - 'no'
events:
  pick_parts_from_pile:
    name: '山から筒状部品を拾う'
    evidence: pick_parts_from_pile==yes
    min_frames: 3
  put_parts_into_box:
    name: '筒状部品を鉄箱に入れる'
    evidence: put_parts_into_box==yes
    min_frames: 2
  reposition_parts_box:
    name: '鉄箱の位置を調整する'
    evidence: reposition_parts_box==yes
    min_frames: 2
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: '抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない'
