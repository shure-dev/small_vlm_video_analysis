sop:
  id: f005_w010_manual_lathe
  name: 手動旋盤のメガネレンチと操作部の操作
  domain_hint: 作業者視点で、旋盤、円形金属治具、メガネレンチ、操作ハンドルを扱う20秒の工場動画
events:
- id: turn_center_hex_with_box_wrench
  ask: 作業者が左手で旋盤主軸側の円形金属治具を押さえ、右手の銀色メガネレンチを中央の六角部へ掛け直しながら繰り返し回している
  values:
  - 'yes'
  - 'no'
- id: place_box_wrench_on_carriage
  ask: 作業者が銀色メガネレンチを旋盤右側の往復台上へ置いている
  values:
  - 'yes'
  - 'no'
- id: press_left_lathe_control
  ask: 作業者が旋盤左の赤白色の四角い操作部を左手で操作している
  values:
  - 'yes'
  - 'no'
- id: operate_front_carriage_handle
  ask: 作業者が左手で旋盤往復台の手前側にある黒い大径ハンドルを握って操作している
  values:
  - 'yes'
  - 'no'
