sop:
  id: f005_w010_manual_lathe
  name: 'Factory Ego: f005_w010_manual_lathe'
  domain_hint: 工場の一人称視点（頭部装着カメラ）映像。手動旋盤とスパナ、赤い鋳物部品。
events:
- id: tighten_workpiece_nut
  ask: 作業者がスパナでナットを締めている
  values:
  - 'yes'
  - 'no'
  min_frames: 4
- id: place_wrench_on_carriage
  ask: 作業者がスパナを往復台の上に置いている
  values:
  - 'yes'
  - 'no'
  min_frames: 2
- id: start_spindle
  ask: 作業者が主軸のレバーを操作している
  values:
  - 'yes'
  - 'no'
  min_frames: 2
- id: run_spindle
  ask: 作業者が工作物を回転させている
  values:
  - 'yes'
  - 'no'
  min_frames: 4
- id: feed_cutting_tool
  ask: 作業者が回転している工作物に刃物を近づけて削っている
  values:
  - 'yes'
  - 'no'
  min_frames: 2
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: 抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない
