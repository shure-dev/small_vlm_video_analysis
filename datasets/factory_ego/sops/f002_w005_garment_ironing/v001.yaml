  - 'yes'
  - 'no'
- id: final_fold
  ask: 'Considering the motion across the recent frames, is the worker flipping the folded shirt over or folding it in half again to finish in the latest frame?'
  values:
  - 'yes'
  - 'no'
events:
  iron_press:
    evidence: iron_press==yes
    min_frames: 2
  remove_board:
    evidence: remove_board==yes
    min_frames: 2
  final_fold:
    evidence: final_fold==yes
    min_frames: 1
