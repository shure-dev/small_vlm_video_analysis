  domain_hint: 'First-person camera of a worker folding t-shirts at an ironing table using a white folding board and an iron.'
questions:
- id: iron_press
  ask: 'Considering the motion across the recent frames, is the worker pressing the folded shirt with the iron in the latest frame?'
  values:
  - 'yes'
  - 'no'
- id: remove_board
  ask: 'Considering the motion across the recent frames, is the worker sliding the white folding board out of the folded shirt in the latest frame?'
