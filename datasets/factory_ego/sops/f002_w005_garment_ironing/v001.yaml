sop:
  id: f002_w005_garment_ironing
  name: 'Factory Ego: f002_w005_garment_ironing'
  domain_hint: 工場の一人称視点（頭部装着カメラ）映像。折り畳み板とアイロンのある衣類仕上げ台。
events:
- id: place_folding_board
  ask: 作業者が白い折り畳み板をシャツの上に置いて位置を合わせている
  values:
  - 'yes'
  - 'no'
  min_frames: 4
- id: fold_shirt_around_board
  ask: 作業者がシャツを板に沿って折り畳んでいる
  values:
  - 'yes'
  - 'no'
  min_frames: 4
- id: flip_and_neaten_folded_shirt
  ask: 作業者が畳んだシャツを表に返して形を整えている
  values:
  - 'yes'
  - 'no'
  min_frames: 3
- id: stack_folded_shirt
  ask: 作業者が畳んだシャツを完成品の山に重ねている
  values:
  - 'yes'
  - 'no'
  min_frames: 2
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: 抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない
