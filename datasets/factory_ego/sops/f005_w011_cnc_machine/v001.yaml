sop:
  id: f005_w011_cnc_machine
  name: 'Factory Ego: f005_w011_cnc_machine'
  domain_hint: 工場の一人称視点（頭部装着カメラ）映像。CNC機と操作盤、部品トレイ。
events:
- id: load_workpiece_into_chuck
  ask: 作業者は機械のチャックに部品を取り付けているか？
  values:
  - 'yes'
  - 'no'
  min_frames: 2
- id: press_control_panel_button
  ask: 作業者は操作盤のボタンを押しているか？
  values:
  - 'yes'
  - 'no'
  min_frames: 1
- id: close_machine_door
  ask: 作業者は機械の扉（カバー）を閉めているか？
  values:
  - 'yes'
  - 'no'
  min_frames: 1
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: 抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない
