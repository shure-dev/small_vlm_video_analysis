sop:
  id: f002_w002_garment_bagging
  name: 折り畳み衣類の袋詰め
  domain_hint: 作業者視点で、折り畳まれた衣類を透明な包装袋へ入れて封をする20秒の工場動画
events:
  - id: pick_garment_from_stack
    ask: 作業者が積み重なった折り畳み衣類の一番上を手でつかんで持ち上げている
  - id: insert_garment_into_bag
    ask: 作業者が折り畳まれた衣類を透明な包装袋の開口部から中へ滑り込ませている
  - id: seal_bag_flap
    ask: 作業者が透明な包装袋の粘着フラップを折り返し、指で押さえて封をしている
  - id: place_package_to_right
    ask: 作業者が封をした衣類の包装を持ち上げ、作業台の右側へ移して置いている
