  - 'yes'
  - 'no'
- id: seal_bag
  ask: 'Considering the motion across the recent frames, is the worker peeling the adhesive strip or pressing the bag flap shut to seal the package in the latest frame?'
  values:
  - 'yes'
  - 'no'
events:
  fold_garment:
    evidence: fold_garment==yes
    min_frames: 2
  insert_bag:
    evidence: insert_bag==yes
    min_frames: 2
  seal_bag:
    evidence: seal_bag==yes
    min_frames: 1
