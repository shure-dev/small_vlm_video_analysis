sop:
  id: f002_w002_garment_bagging
  name: 'Factory Ego: f002_w002_garment_bagging'
  domain_hint: '工場の一人称視点（頭部装着カメラ）映像。畳んだ服の山とビニール袋のある梱包台。'
questions:
- id: pick_garment_from_stack
  ask: '作業者は積まれた服のスタックから服を1枚取っているか？'
  values:
  - 'yes'
  - 'no'
- id: insert_garment_into_bag
  ask: '作業者は服をプラスチックの袋に入れているか？'
  values:
  - 'yes'
  - 'no'
- id: seal_bag_flap
  ask: '作業者は袋の口を折り込んで閉じているか？'
  values:
  - 'yes'
  - 'no'
- id: place_package_right
  ask: '作業者は袋詰めした服を右側に置いているか？'
  values:
  - 'yes'
  - 'no'
events:
  pick_garment_from_stack:
    name: 'スタックから服を取る'
    evidence: pick_garment_from_stack==yes
    min_frames: 2
  insert_garment_into_bag:
    name: '服を袋に入れる'
    evidence: insert_garment_into_bag==yes
    min_frames: 3
  seal_bag_flap:
    name: '袋の口を閉じる'
    evidence: seal_bag_flap==yes
    min_frames: 4
  place_package_right:
    name: '完成品を右側に置く'
    evidence: place_package_right==yes
    min_frames: 2
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: '抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない'
