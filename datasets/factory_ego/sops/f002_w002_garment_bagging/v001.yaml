sop:
  id: f002_w002_garment_bagging
  name: 'Factory Ego: f002_w002_garment_bagging'
  domain_hint: 工場の一人称視点（頭部装着カメラ）映像。畳んだ服の山とビニール袋のある梱包台。
events:
- id: pick_garment_from_stack
  ask: 作業者が積まれた服のスタックから服を1枚取っている
  values:
  - 'yes'
  - 'no'
  min_frames: 2
- id: insert_garment_into_bag
  ask: 作業者が服をプラスチックの袋に入れている
  values:
  - 'yes'
  - 'no'
  min_frames: 3
- id: seal_bag_flap
  ask: 作業者が袋の口を折り込んで閉じている
  values:
  - 'yes'
  - 'no'
  min_frames: 4
- id: place_package_right
  ask: 作業者が袋詰めした服を右側に置いている
  values:
  - 'yes'
  - 'no'
  min_frames: 2
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: 抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない
