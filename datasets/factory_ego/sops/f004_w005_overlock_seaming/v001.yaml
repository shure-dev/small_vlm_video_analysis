  name: 'Factory Ego: f004_w005_overlock_seaming'
  domain_hint: 'First-person camera of a worker at a white industrial overlock sewing machine seaming pink fabric pieces from a large pile.'
questions:
- id: finish_seam
  ask: 'Considering the motion across the recent frames, is the worker sewing the end of a seam on pink fabric at the machine in the latest frame?'
  values:
  - 'yes'
  - 'no'
- id: remove_toss
  ask: 'Considering the motion across the recent frames, is the worker pulling the sewn piece off the machine, breaking the thread, or tossing it onto the finished pile in the latest frame?'
