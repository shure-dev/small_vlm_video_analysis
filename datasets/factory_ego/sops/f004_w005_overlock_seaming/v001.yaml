sop:
  id: f004_w005_overlock_seaming
  name: 'Factory Ego: f004_w005_overlock_seaming'
  domain_hint: '工場の一人称視点（頭部装着カメラ）映像。白いミシンとピンク色の布の山。'
questions:
- id: pick_piece_from_pile
  ask: '作業者は布の山から布を取り上げているか？'
  values:
  - 'yes'
  - 'no'
- id: unfold_and_orient_piece
  ask: '作業者は布を手元で広げて向きを整えているか？'
  values:
  - 'yes'
  - 'no'
- id: check_seam_edge_by_hand
  ask: '作業者は布端の縫い目を指でつまんで確認しているか？'
  values:
  - 'yes'
  - 'no'
- id: set_piece_under_needle
  ask: '作業者は布をミシンの針元に合わせて置いているか？'
  values:
  - 'yes'
  - 'no'
events:
  pick_piece_from_pile:
    name: '布の山から布を取り上げる'
    evidence: pick_piece_from_pile==yes
    min_frames: 2
  unfold_and_orient_piece:
    name: '布を広げて向きを整える'
    evidence: unfold_and_orient_piece==yes
    min_frames: 3
  check_seam_edge_by_hand:
    name: '布端の縫い目を確認する'
    evidence: check_seam_edge_by_hand==yes
    min_frames: 4
  set_piece_under_needle:
    name: '布を針元に合わせて置く'
    evidence: set_piece_under_needle==yes
    min_frames: 4
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: '抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない'
