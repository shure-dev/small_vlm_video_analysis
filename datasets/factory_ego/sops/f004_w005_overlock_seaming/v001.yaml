  - 'yes'
  - 'no'
- id: pick_unfold
  ask: 'Considering the motion across the recent frames, is the worker picking a new pink piece from the pile and unfolding or aligning its edges in the latest frame?'
  values:
  - 'yes'
  - 'no'
events:
  finish_seam:
    evidence: finish_seam==yes
    min_frames: 1
  remove_toss:
    evidence: remove_toss==yes
    min_frames: 2
  pick_unfold:
    evidence: pick_unfold==yes
    min_frames: 2
