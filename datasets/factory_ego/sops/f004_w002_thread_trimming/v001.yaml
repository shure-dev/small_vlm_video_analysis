sop:
  id: f004_w002_thread_trimming
  name: 'Factory Ego: f004_w002_thread_trimming'
  domain_hint: '工場の一人称視点（頭部装着カメラ）映像。白いベビー服と糸切りばさみのある仕上げ台。'
questions:
- id: spread_garment_flat
  ask: '作業者は服を台の上に広げて平らに整えているか？'
  values:
  - 'yes'
  - 'no'
- id: pick_next_garment
  ask: '作業者は次の服を布の山から取り上げているか？'
  values:
  - 'yes'
  - 'no'
- id: trim_threads_upper
  ask: '作業者は糸切りばさみで服の襟や肩まわりの糸を切っているか？'
  values:
  - 'yes'
  - 'no'
- id: trim_threads_hem
  ask: '作業者は服の裾をめくり上げて糸を切っているか？'
  values:
  - 'yes'
  - 'no'
events:
  spread_garment_flat:
    name: '服を広げて整える'
    evidence: spread_garment_flat==yes
    min_frames: 3
  pick_next_garment:
    name: '次の服を取る'
    evidence: pick_next_garment==yes
    min_frames: 2
  trim_threads_upper:
    name: '襟・肩まわりの糸切り'
    evidence: trim_threads_upper==yes
    min_frames: 4
  trim_threads_hem:
    name: '裾をめくって糸切り'
    evidence: trim_threads_hem==yes
    min_frames: 3
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: '抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない'
