sop:
  id: f004_w002_thread_trimming
  name: 'Factory Ego: f004_w002_thread_trimming'
  domain_hint: 工場の一人称視点（頭部装着カメラ）映像。白いベビー服と糸切りばさみのある仕上げ台。
events:
- id: spread_garment_flat
  ask: 作業者が服を台の上に広げて平らに整えている
  values:
  - 'yes'
  - 'no'
  min_frames: 3
- id: pick_next_garment
  ask: 作業者が次の服を布の山から取り上げている
  values:
  - 'yes'
  - 'no'
  min_frames: 2
- id: trim_threads_upper
  ask: 作業者が糸切りばさみで服の襟や肩まわりの糸を切っている
  values:
  - 'yes'
  - 'no'
  min_frames: 4
benchmark:
  schema_version: '1.0'
  version: v001
  status: provisional
  purpose: model_accuracy_comparison
  provenance: 抽出フレーム(2fps・20秒窓)を目視して定義(docs/benchmark/events.mdの方法論に従う)。人手GTではない
