dataset_id: factory_ego
name: Factory Ego manual temporal annotation pilot
purpose: human-annotated industrial egocentric video event localization
upstream:
  id: builddotai/Egocentric-10K
  url: https://huggingface.co/datasets/builddotai/Egocentric-10K
  license: Apache-2.0
  access: gated_contact_information_required
benchmark_state:
  human_ground_truth:
    status: partial
    revision: human
  formal_accuracy_available: false
unit_count: 20
media_distribution: gated_source_frames_not_in_public_repository
sampling_policy:
  strategy: fixed 20-clip manual annotation pilot
  window: 20 seconds at 2 fps
  growth: add new source clips through the dataset import workflow
