# 意図的に間違えたSOP: 実施していない「手袋着用確認」を最初に要求する。
# 存在しない工程を手順書に混ぜたとき、検出コードが「やった」とごまかさずに
# NOT_DETECTEDとしてFAILを出せるかを検証するための比較用ファイル。
schema_version: "0.1"

sop:
  id: konro_inspection_missing_step
  name: コンロ始業前点検（誤った手順：実施していない「手袋着用確認」を追加）
  domain_hint: "これはガスコンロの点検作業を上から撮った動画の1フレームです。コンロ手前には左右2つのつまみが並び、下部の引き出しは中央〜左寄りが魚焼きグリル、その右隣に電池ケースの小さな引き出しがある"

defaults:
  order_tolerance_s: 1.0
  min_frames: 1
  max_gap_frames: 2

questions:
  - id: knob
    ask: "コンロ手前に左右2つ並んだつまみのどちらかを手が操作しているか"
    values: ["yes", "no"]
  - id: flame
    ask: "コンロ上部のバーナー(つまみの奥)に炎が見えるか"
    values: ["yes", "no"]
  - id: pointing
    ask: "人差し指を立てた手(指差し)が写っているか"
    values: ["yes", "no"]
  - id: grill
    ask: "コンロ下部引き出しのうち、中央〜左寄りにある魚焼きグリルが開いているか"
    values: ["yes", "no", "unclear"]
  - id: battery
    ask: "コンロ下部引き出しのうち、グリルの右隣にある小さな電池ケースに乾電池が見えるか"
    values: ["yes", "no"]
  - id: gloves
    ask: "手に手袋(軍手・ゴム手袋等)を着用しているか"
    values: ["yes", "no"]

events:
  gloves_check:                    # 実際には存在しない工程(検出されないはず)
    evidence: "gloves==yes"
  ignite:
    evidence: "knob==yes"
    min_frames: 2
  point1:
    evidence: "pointing==yes"
    occurrence: 1
  grill_open:
    evidence: "grill==yes"
    min_frames: 2
  point2:
    evidence: "pointing==yes"
    occurrence: 2
  battery_check:
    evidence: "battery==yes"

relations:
  - gloves_check before ignite     # 誤ったSOP: 手袋着用確認が最初であるべき
  - ignite before point1
  - point1 before grill_open
  - grill_open before point2
  - point2 overlaps battery_check

# --- Phase 0: 正解。違反の「理由」は実施していない手袋着用確認(gloves_check)が未検出であること ---
expect:
  verdict: FAIL
  because:
    - event: gloves_check           # 存在しない工程は未検出であるべき
      kind: missing
