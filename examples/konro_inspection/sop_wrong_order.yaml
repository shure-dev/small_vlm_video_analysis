# 意図的に間違えたSOP: 電池確認を最初に要求する。
# sop.yaml と同じ質問(questions)・同じ動画に対して、relations の宣言だけを変え、
# 「手順書の方を書き換えても、そのズレを検出できるか」を検証するための比較用ファイル。
schema_version: "0.1"

sop:
  id: konro_inspection_wrong_order
  name: コンロ始業前点検（誤った手順：電池確認を最初に要求）
  domain_hint: "これはガスコンロの点検作業を上から撮った動画の1フレームです。コンロ手前には左右2つのつまみが並び、下部の引き出しは中央〜左寄りが魚焼きグリル、その右隣に電池ケースの小さな引き出しがある"

defaults:
  order_tolerance_s: 1.0
  min_frames: 1
  max_gap_frames: 2

questions:
  - id: knob
    ask: "コンロ手前に左右2つ並んだつまみのどちらかを手が操作しているか"
    values: ["yes", "no"]
  - id: flame
    ask: "コンロ上部のバーナー(つまみの奥)に炎が見えるか"
    values: ["yes", "no"]
  - id: pointing
    ask: "人差し指を立てた手(指差し)が写っているか"
    values: ["yes", "no"]
  - id: grill
    ask: "コンロ下部引き出しのうち、中央〜左寄りにある魚焼きグリルが開いているか"
    values: ["yes", "no", "unclear"]
  - id: battery
    ask: "コンロ下部引き出しのうち、グリルの右隣にある小さな電池ケースに乾電池が見えるか"
    values: ["yes", "no"]
  - id: gloves
    ask: "手に手袋(軍手・ゴム手袋等)を着用しているか"
    values: ["yes", "no"]

events:
  battery_check:
    evidence: "battery==yes"
  ignite:
    evidence: "knob==yes"
    min_frames: 2
  point1:
    evidence: "pointing==yes"
    occurrence: 1
  grill_open:
    evidence: "grill==yes"
    min_frames: 2
  point2:
    evidence: "pointing==yes"
    occurrence: 2
  gloves_worn:
    evidence: "gloves==yes"
    min_frames: 1

relations:
  - battery_check before ignite   # 誤ったSOP: 電池確認が最初であるべき
  - ignite before point1
  - point1 before grill_open
  - grill_open before point2
  - not gloves_worn

# --- Phase 0: 正解。この誤SOPが違反になる「理由」は電池確認と点火の順序が逆であること ---
expect:
  verdict: FAIL
  because:
    - relation: "battery_check before ignite"   # 電池確認は点火より後 = 順序が逆
      kind: order_reversed
